<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Study Coach</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    width:350px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#4f46e5;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}

p{
    text-align:center;
    margin-top:20px;
}

a{
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h1>Login</h1>
    
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button onclick="login()">Login</button>

    <p>Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>
</div>

<script>
function login(){
    // 1. Get the values from the input fields
    const emailInput = document.getElementById("email").value;
    const passwordInput = document.getElementById("password").value;

    // 2. Define a temporary dummy account for testing
    const correctEmail = "student@test.com";
    const correctPassword = "password123";

    // 3. Validate credentials
    if (emailInput === "" || passwordInput === "") {
        alert("Please fill in all fields.");
    } else if (emailInput === correctEmail && passwordInput === correctPassword) {
        alert("Login successful! Redirecting to your dashboard...");
        // 4. Redirect to the main dashboard page
        window.location.href = "Untitled-1.html"; 
    } else {
        alert("Incorrect email or password. Please try again.");
    }
}
</script>

</body>
</html>
